<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../styles/style.css">
  <title>Publicación</title>
</head>

<body>
  <div class="container-md">
    <a class="volver_btn btn" href="inicio.html">Volver</a>

    <div class=" publicacion_container">
      <div class="card" style="width: 30rem;">
        <img id="imagenProducto" class="card-img-top" alt="Imagen del producto">
        <div class="card-body">
          <h5 id="tituloProducto" class="card-title"></h5>
          <p class="card-text">
            <b>Descripción:</b>
            <span id="descripcionProducto"></span>
          </p>
        </div>
        <ul class="list-group list-group-flush">

          <li class="list-group-item">
            <b>Precio aproximado:</b>
            $<span id="precioProducto"></span>
          </li>


          <li class="list-group-item">
            <b>Estado:</b>
            <span id="estadoProducto"></span>
          </li>


          <li class="list-group-item">
            <b>Dueño:</b>
            <a id="duenoProducto"></a>
          </li>

          <li class="list-group-item">
            <b>Categoría:</b>
            <span id="categoriaProducto"></span>
          </li>

          <li class="list-group-item">
            <b>Subcategoría:</b>
            <span id="subcategoriaProducto"></span>
          </li>
        </ul>
        <div class="card-body">
          <a href="solicitud.html" class="btn">enviar solicitud</a>
        </div>
      </div>
    </div>
  </div>
  <script src="js/publicacion.js"></script>
</body>
