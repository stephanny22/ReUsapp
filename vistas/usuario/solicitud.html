<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../styles/style.css">
    <title>Publicación</title>
</head>

<body>
    <div class="container-lg">

        <a class=" volver_btn btn" href="publicacion.html">Volver</a>
        <div class="form-container">

            <h1>Solicitar producto</h1>
            <form id="formSolicitud">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Cantidad a solicitar</label>
                    <input id="cantidad" type="number" min="1" class="form-control">
                </div>
                <label for="">Producto a ofrecer:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="tipoProducto" id="check_creado">
                    <label class="form-check-label" for="check_creado">
                        Producto ya creado
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="tipoProducto" id="check_nuevo">
                    <label class="form-check-label" for="check_nuevo">
                        Producto nuevo
                    </label>
                </div>
                <div id="opciones_creado" style="display:none;">
                    <label>Seleccione el producto</label>
                    <select id="productoExistente" class="form-select">
                    </select>
                </div>

                <div id="opciones_nuevo" style="display:none;">

                    <div class="mb-3">
                        <label>Nombre del producto</label>
                        <input id="nombreProducto" type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Ingrese un precio aproximado:</label>
                        <input id="precioProducto" type="number" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Descripción</label>
                        <textarea id="descripcionProducto" class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Inserte una imagen</label>
                        <input id="imagenProducto" type="file" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Seleccione la categoría</label>
                        <select id="subcategoriaProducto" class="form-select">
                            <option value="1">Celulares</option>
                            <option value="2">Computadores</option>
                            <option value="3">Electrodomésticos</option>
                            <option value="4">Camisas</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Seleccione el estado</label>
                        <select id="estadoProducto" class="form-select">
                            <option value="NUEVO">Nuevo</option>
                            <option value="USADO">Usado</option>
                        </select>
                    </div>

                </div>
                <button onclick="window.location.href='';" type="submit" class="btn">Enviar solicitud</button>
            </form>
        </div>
    </div>
    <script>
        const creado = document.getElementById("check_creado");
        const nuevo = document.getElementById("check_nuevo");

        const opcionesCreado = document.getElementById("opciones_creado");
        const opcionesNuevo = document.getElementById("opciones_nuevo");

        creado.addEventListener("change", () => {
            if (creado.checked) {
                opcionesCreado.style.display = "block";
                opcionesNuevo.style.display = "none";
            }
        });

        nuevo.addEventListener("change", () => {
            if (nuevo.checked) {
                opcionesNuevo.style.display = "block";
                opcionesCreado.style.display = "none";
            }
        });
    </script>
    <script src="js/solicitud.js"></script>
</body>
