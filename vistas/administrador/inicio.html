<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../styles/style.css">
    <title>Administrador</title>
</head>

<body>

    <div class="form-container">

        <h1>Administrador</h1>

        <p class="text-center">
            Inicie sesión para acceder al panel administrativo
        </p>

        <form id="loginAdmin">

            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="correo" placeholder="admin@reusapp.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="clave" placeholder="********" required>
            </div>

            <button type="submit" class="btn w-100">
                Iniciar sesión
            </button>

        </form>

        <br>

        <p class="text-center">
            <a href="index.html">Volver al inicio de sesión de usuarios</a>
        </p>

    </div>

    <script>

        document.getElementById("loginAdmin").addEventListener("submit", function (event) {

            event.preventDefault();

            var correo = document.getElementById("correo").value;
            var clave = document.getElementById("clave").value;

           
            if (correo == "admin@reusapp.com" && clave == "admin123") {

                alert("Bienvenido Administrador");
                window.location.href = "paneladmin.html";

            } else {

                alert("Correo o contraseña incorrectos");

            }

        });

    </script>

</body>

</html>
